<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>카카오톡 오픈채팅 이미지 생성</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f2f1ed; --surface: #ffffff; --surface2: #eeede7;
  --border: #dddcd5; --border2: #c8c7bf;
  --text: #1a1a1a; --text2: #666660; --text3: #9a9993;
  --accent: #1a1a1a; --radius: 14px; --radius-sm: 8px;
}
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; -webkit-font-smoothing: antialiased; }
body { padding: 20px 16px 40px; }
.header { text-align: center; padding: 8px 0 24px; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.04em; }
.header p { font-size: 13px; color: var(--text3); margin-top: 5px; }
.layout { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
@media (min-width: 680px) {
  .layout { display: grid; grid-template-columns: 1fr 1fr; align-items: start; gap: 20px; }
  .preview-panel { order: 2; position: sticky; top: 20px; }
  .control-panel { order: 1; }
}
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 18px; }
.field { display: flex; flex-direction: column; gap: 8px; }
.label { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); }
textarea { width: 100%; height: 100px; resize: none; padding: 12px 14px; font-size: 16px; font-family: 'Noto Sans KR', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); line-height: 1.6; -webkit-appearance: none; appearance: none; }
textarea:focus { outline: none; border-color: var(--border2); background: var(--surface); }
textarea::placeholder { color: var(--text3); }
.font-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.font-btn { padding: 10px 8px; font-size: 13px; text-align: center; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text2); cursor: pointer; -webkit-appearance: none; appearance: none; touch-action: manipulation; }
.font-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.size-row { display: flex; align-items: center; gap: 12px; }
.size-row input[type="range"] { flex: 1; -webkit-appearance: none; appearance: none; height: 5px; border-radius: 3px; background: var(--border); outline: none; cursor: pointer; }
.size-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 3px solid #fff; box-shadow: 0 0 0 1px var(--border2); }
.size-row input[type="range"]::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); border: 3px solid #fff; cursor: pointer; }
.size-val { font-size: 15px; font-weight: 700; min-width: 44px; text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }
.tab-row { display: flex; gap: 4px; background: var(--surface2); border-radius: var(--radius-sm); padding: 3px; }
.tab-btn { flex: 1; padding: 8px 0; font-size: 14px; font-weight: 600; text-align: center; border: none; border-radius: 6px; background: transparent; color: var(--text3); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; touch-action: manipulation; }
.tab-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.10); }
.solid-section, .grad-section { display: none; }
.solid-section.show, .grad-section.show { display: flex; flex-direction: column; gap: 10px; }
.color-row { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
.color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; touch-action: manipulation; }
.color-dot.active { border-color: var(--accent); box-shadow: 0 0 0 2px #fff inset; }
.custom-color-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.custom-color-row label { font-size: 13px; color: var(--text3); }
input[type="color"] { width: 38px; height: 38px; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; padding: 2px; background: none; -webkit-appearance: none; }
.grad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.grad-swatch { height: 42px; border-radius: var(--radius-sm); cursor: pointer; border: 2px solid transparent; touch-action: manipulation; }
.grad-swatch.active { border-color: var(--accent); }
.grad-custom { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.grad-custom label { font-size: 13px; color: var(--text3); }
.dir-row { display: flex; gap: 5px; }
.dir-btn { flex: 1; padding: 9px 0; font-size: 18px; text-align: center; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text2); cursor: pointer; font-family: sans-serif; touch-action: manipulation; }
.dir-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-row { display: flex; gap: 8px; }
.btn-random, .btn-dl { flex: 1; padding: 14px 0; font-size: 14px; font-weight: 700; border-radius: var(--radius-sm); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; touch-action: manipulation; -webkit-appearance: none; appearance: none; }
.btn-random { border: 1px solid var(--border2); background: var(--surface2); color: var(--text); }
.btn-dl { border: none; background: var(--accent); color: #fff; }
.btn-dl:active { opacity: 0.8; transform: scale(0.98); }
.canvas-wrap { width: 100%; aspect-ratio: 1; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: #ddd; }
canvas#mainCanvas { width: 100%; height: 100%; display: block; }
.thumb-section { display: flex; align-items: center; gap: 14px; padding: 14px; background: var(--surface2); border-radius: var(--radius-sm); border: 1px solid var(--border); }
.thumb-frame { width: 56px; height: 56px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); flex-shrink: 0; }
canvas#thumbCanvas { width: 56px; height: 56px; display: block; }
.thumb-text { font-size: 12px; color: var(--text2); line-height: 1.6; }
.thumb-text strong { font-size: 13px; color: var(--text); display: block; margin-bottom: 2px; }
.preview-panel { order: -1; }
.control-panel { order: 1; }
@media (min-width: 680px) { .preview-panel { order: 2; } .control-panel { order: 1; } body { padding: 28px 20px 48px; } }
</style>
</head>
<body>
<div class="header">
  <h1>카카오톡 오픈채팅 이미지 생성</h1>
  <p>텍스트 입력 → 1000×1000 이미지 즉시 생성</p>
</div>
<div class="layout">
  <div class="panel preview-panel">
    <div class="label">미리보기</div>
    <div class="canvas-wrap"><canvas id="mainCanvas" width="1000" height="1000"></canvas></div>
    <div class="thumb-section">
      <div class="thumb-frame"><canvas id="thumbCanvas" width="1000" height="1000"></canvas></div>
      <div class="thumb-text"><strong>카카오톡 썸네일</strong>채팅방에서 보이는 실제 크기</div>
    </div>
  </div>
  <div class="panel control-panel">
    <div class="field">
      <div class="label">텍스트</div>
      <textarea id="txt" placeholder="여기에 텍스트를 입력하세요&#10;줄바꿈도 지원됩니다"></textarea>
    </div>
    <div class="field">
      <div class="label">폰트</div>
      <div class="font-grid" id="fontGrid"></div>
    </div>
    <div class="field">
      <div class="label">글자 크기</div>
      <div class="size-row">
        <input type="range" id="fontSize" min="180" max="500" value="200" step="5">
        <span class="size-val" id="fsVal">200</span>
      </div>
    </div>
    <div class="field">
      <div class="label">배경</div>
      <div class="tab-row">
        <button class="tab-btn active" id="tabSolid">단색</button>
        <button class="tab-btn" id="tabGrad">그라데이션</button>
      </div>
      <div class="solid-section show" id="solidSec">
        <div class="color-row" id="presets"></div>
        <div class="custom-color-row">
          <label>직접 선택</label>
          <input type="color" id="colorPicker" value="#222222">
        </div>
      </div>
      <div class="grad-section" id="gradSec">
        <div class="grad-grid" id="gradGrid"></div>
        <div class="grad-custom">
          <label>색1</label><input type="color" id="gradC1" value="#FF6B6B">
          <label>색2</label><input type="color" id="gradC2" value="#4ECDC4">
        </div>
        <div class="dir-row" id="gradDir">
          <button class="dir-btn active" data-angle="90">→</button>
          <button class="dir-btn" data-angle="135">↘</button>
          <button class="dir-btn" data-angle="180">↓</button>
          <button class="dir-btn" data-angle="225">↙</button>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-random" id="btnRandom">🎲 랜덤</button>
      <button class="btn-dl" id="btnDl">⬇ 다운로드</button>
    </div>
  </div>
</div>
<script>
const fonts = [
  { label: 'Noto Sans KR', family: "'Noto Sans KR', sans-serif", weight: '700' },
  { label: 'Nanum Gothic', family: "'Nanum Gothic', sans-serif", weight: '800' },
  { label: 'Black Han Sans', family: "'Black Han Sans', sans-serif", weight: '400' },
  { label: '굵은 Noto', family: "'Noto Sans KR', sans-serif", weight: '900' },
  { label: '얇은 Nanum', family: "'Nanum Gothic', sans-serif", weight: '700' },
];
const presetColors = ['#1a1a1a','#FFFFFF','#E8423A','#3A7CE8','#2ECC71','#F39C12','#9B59B6','#1ABC9C','#FF6B6B','#34495E','#4ECDC4','#FFE66D','#FF8B94','#A8E6CF','#6C5CE7'];
const gradPresets = [
  { c1: '#FF6B6B', c2: '#FFE66D', angle: 135 }, { c1: '#4ECDC4', c2: '#3A7CE8', angle: 135 },
  { c1: '#A8E6CF', c2: '#6C5CE7', angle: 180 }, { c1: '#FF8B94', c2: '#FFD3B6', angle: 135 },
  { c1: '#1a1a1a', c2: '#555555', angle: 180 }, { c1: '#F39C12', c2: '#E8423A', angle: 135 },
  { c1: '#9B59B6', c2: '#3A7CE8', angle: 135 }, { c1: '#2ECC71', c2: '#1ABC9C', angle: 180 },
];
let mode = 'solid', currentBg = '#1a1a1a', currentGrad = { c1: '#FF6B6B', c2: '#4ECDC4', angle: 90 }, currentFontIdx = 0;
const fontGrid = document.getElementById('fontGrid');
const presetsEl = document.getElementById('presets');
const gradGridEl = document.getElementById('gradGrid');
const txtEl = document.getElementById('txt');
const colorPicker = document.getElementById('colorPicker');
const gradC1El = document.getElementById('gradC1');
const gradC2El = document.getElementById('gradC2');
const fsSlider = document.getElementById('fontSize');
const fsValEl = document.getElementById('fsVal');
const mainCanvas = document.getElementById('mainCanvas');
const thumbCanvas = document.getElementById('thumbCanvas');
const ctx = mainCanvas.getContext('2d');
const tctx = thumbCanvas.getContext('2d');

fonts.forEach((f, i) => {
  const btn = document.createElement('button');
  btn.className = 'font-btn' + (i === 0 ? ' active' : '');
  btn.textContent = f.label; btn.style.fontFamily = f.family;
  btn.onclick = () => { document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFontIdx = i; draw(); };
  fontGrid.appendChild(btn);
});
presetColors.forEach(c => {
  const dot = document.createElement('div');
  dot.className = 'color-dot' + (c === currentBg ? ' active' : '');
  dot.style.background = c;
  if (c === '#FFFFFF') dot.style.boxShadow = 'inset 0 0 0 1px #ccc';
  dot.onclick = () => { currentBg = c; colorPicker.value = (c.length === 7 && c.startsWith('#')) ? c : '#222222'; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); dot.classList.add('active'); draw(); };
  presetsEl.appendChild(dot);
});
gradPresets.forEach((g, i) => {
  const sw = document.createElement('div');
  sw.className = 'grad-swatch' + (i === 0 ? ' active' : '');
  sw.style.background = `linear-gradient(${g.angle}deg, ${g.c1}, ${g.c2})`;
  sw.onclick = () => { currentGrad = { ...g }; gradC1El.value = g.c1; gradC2El.value = g.c2; document.querySelectorAll('.grad-swatch').forEach(s => s.classList.remove('active')); sw.classList.add('active'); updateDirBtns(); draw(); };
  gradGridEl.appendChild(sw);
});
document.querySelectorAll('.dir-btn').forEach(btn => {
  btn.onclick = () => { currentGrad.angle = parseInt(btn.dataset.angle); document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); draw(); };
});
function updateDirBtns() { document.querySelectorAll('.dir-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.angle) === currentGrad.angle)); }
document.getElementById('tabSolid').onclick = () => { mode = 'solid'; document.getElementById('tabSolid').classList.add('active'); document.getElementById('tabGrad').classList.remove('active'); document.getElementById('solidSec').classList.add('show'); document.getElementById('gradSec').classList.remove('show'); draw(); };
document.getElementById('tabGrad').onclick = () => { mode = 'grad'; document.getElementById('tabGrad').classList.add('active'); document.getElementById('tabSolid').classList.remove('active'); document.getElementById('gradSec').classList.add('show'); document.getElementById('solidSec').classList.remove('show'); draw(); };
colorPicker.addEventListener('input', () => { currentBg = colorPicker.value; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); draw(); });
gradC1El.addEventListener('input', () => { currentGrad.c1 = gradC1El.value; document.querySelectorAll('.grad-swatch').forEach(s => s.classList.remove('active')); draw(); });
gradC2El.addEventListener('input', () => { currentGrad.c2 = gradC2El.value; document.querySelectorAll('.grad-swatch').forEach(s => s.classList.remove('active')); draw(); });
txtEl.addEventListener('input', draw);
fsSlider.addEventListener('input', () => { fsValEl.textContent = fsSlider.value; draw(); });
document.getElementById('btnRandom').onclick = () => {
  const r = () => Math.floor(Math.random() * 256);
  const hex = () => '#' + [r(), r(), r()].map(v => v.toString(16).padStart(2, '0')).join('');
  if (mode === 'solid') { currentBg = hex(); colorPicker.value = currentBg; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); }
  else { currentGrad.c1 = hex(); currentGrad.c2 = hex(); gradC1El.value = currentGrad.c1; gradC2El.value = currentGrad.c2; document.querySelectorAll('.grad-swatch').forEach(s => s.classList.remove('active')); }
  draw();
};
function getLuminance(hex) {
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const toL = v => v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4);
  return 0.2126*toL(r) + 0.7152*toL(g) + 0.0722*toL(b);
}
function getTextColor(hex) { try { if (!hex||!hex.startsWith('#')||hex.length!==7) return '#FFFFFF'; return getLuminance(hex) > 0.35 ? '#111111' : '#FFFFFF'; } catch(e) { return '#FFFFFF'; } }
function getGradTextColor(c1, c2) { return (getLuminance(c1)+getLuminance(c2))/2 > 0.35 ? '#111111' : '#FFFFFF'; }
function makeGradient(c, size, angle, c1, c2) {
  const rad = (angle-90)*Math.PI/180, cx = size/2, cy = size/2, len = size*0.7;
  const grad = c.createLinearGradient(cx-Math.cos(rad)*len, cy-Math.sin(rad)*len, cx+Math.cos(rad)*len, cy+Math.sin(rad)*len);
  grad.addColorStop(0, c1); grad.addColorStop(1, c2); return grad;
}
function wrapText(c, text, maxWidth) {
  const lines = [];
  for (const para of text.split('\n')) {
    if (!para) { lines.push(''); continue; }
    let line = '';
    for (const ch of para) { const test = line+ch; if (c.measureText(test).width > maxWidth && line) { lines.push(line); line = ch; } else line = test; }
    if (line) lines.push(line);
  }
  return lines;
}
function draw() {
  const size = 1000, text = txtEl.value||'', fontSize = parseInt(fsSlider.value), font = fonts[currentFontIdx], padding = 60;
  const fontStr = `${font.weight} ${fontSize}px ${font.family}`;
  const maxW = size - padding*2, lineH = fontSize*1.25;
  ctx.font = fontStr;
  const lines = text ? wrapText(ctx, text, maxW) : [];
  const totalH = lines.length*lineH, startY = (size-totalH)/2 + lineH/2;
  [ctx, tctx].forEach(c => {
    c.clearRect(0, 0, size, size);
    c.fillStyle = mode === 'solid' ? currentBg : makeGradient(c, size, currentGrad.angle, currentGrad.c1, currentGrad.c2);
    c.fillRect(0, 0, size, size);
    if (!text) return;
    c.fillStyle = mode === 'solid' ? getTextColor(currentBg) : getGradTextColor(currentGrad.c1, currentGrad.c2);
    c.font = fontStr; c.textAlign = 'center'; c.textBaseline = 'middle';
    lines.forEach((line, i) => c.fillText(line, size/2, startY + i*lineH));
  });
}
document.getElementById('btnDl').onclick = () => {
  if (!txtEl.value.trim()) { alert('텍스트를 입력해주세요!'); return; }
  draw();
  mainCanvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'kakao_openchat.png';
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  }, 'image/png');
};
// 폰트 로딩 완료 후 draw (measureText 오작동 방지)
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => draw());
} else {
  draw();
}
</script>
</body>
</html>
